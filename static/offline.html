<!DOCTYPE html>
<html lang="da" data-theme="light">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Spejderbogen - Offline</title>
	<script>
		const theme = localStorage.getItem('theme');
		if (theme !== null) {
			document.documentElement.setAttribute('data-theme', theme);
		}
	</script>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 2rem;
			background: #f5f5f5;
			color: #333;
		}
		[data-theme="dark"] body {
			background: #1a1a2e;
			color: #e0e0e0;
		}
		.container {
			text-align: center;
			max-width: 400px;
		}
		.icon {
			font-size: 4rem;
			margin-bottom: 1rem;
		}
		h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
		p { line-height: 1.6; margin-bottom: 1.5rem; opacity: 0.8; }
		button {
			padding: 0.75rem 1.5rem;
			border: none;
			border-radius: 0.5rem;
			background: #003865;
			color: #fff;
			font-size: 1rem;
			cursor: pointer;
		}
		button:hover { opacity: 0.9; }
	</style>
</head>
<body>
	<div class="container">
		<div class="icon">&#x1F3D5;</div>
		<h1>Du er offline</h1>
		<p>Det ser ud til, at du ikke har internetforbindelse. Hvis du har brugt appen tidligere, burde den stadig virke. Prøv at gå tilbage.</p>
		<button onclick="history.back()">Gå tilbage</button>
	</div>
</body>
</html>
